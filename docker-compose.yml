services:
  postgres:
    image: postgres:18
    container_name: v2-postgres
    ports:
      - "10220:5432"
    environment:
      POSTGRES_DB: lattice_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - v2_pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lattice_v2"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - v2-network

  redis:
    image: redis:7-alpine
    container_name: v2-redis
    ports:
      - "10221:6379"
    volumes:
      - v2_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - v2-network

volumes:
  v2_pg_data:
    driver: local
  v2_redis_data:
    driver: local

networks:
  v2-network:
    driver: bridge
