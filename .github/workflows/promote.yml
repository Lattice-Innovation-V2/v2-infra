# Reusable workflow: promote an existing image to another environment.
#
# Looks up the image currently running in the source service and
# deploys it to the target service. No rebuild — same bytes.
#
# Uses prefix-based service naming: {prefix}-{service_name}
#   e.g. linno-v2-dev-integrator-service → linno-v2-pa-integrator-service
#
# Usage from a per-service or promote-all workflow:
#   uses: Lattice-Innovation-V2/v2-infra/.github/workflows/promote.yml@main
#   with:
#     service_name: integrator-service
#     from_prefix: linno-v2-dev
#     to_prefix: linno-v2-pa
#     to_environment: preview-a
#     deploy_tag: pa-2026-03-13

name: Promote to Environment

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name (e.g. integrator-service)"
        required: true
        type: string
      from_prefix:
        description: "Source service prefix (e.g. linno-v2-dev)"
        required: true
        type: string
      to_prefix:
        description: "Target service prefix (e.g. linno-v2-pa)"
        required: true
        type: string
      to_environment:
        description: "Target environment name (e.g. preview-a, preview-b)"
        required: true
        type: string
      deploy_tag:
        description: "Deploy tag (e.g. pa-2026-03-13)"
        required: false
        type: string
        default: ""
      memory:
        description: "Memory allocation"
        required: false
        type: string
        default: "512Mi"
      cpu:
        description: "CPU allocation"
        required: false
        type: string
        default: "1"
      max_instances:
        description: "Maximum instances"
        required: false
        type: number
        default: 5
      port:
        description: "Container port"
        required: false
        type: number
        default: 8080
      env_vars:
        description: "Environment variables"
        required: false
        type: string
        default: ""
      secrets:
        description: "Secrets"
        required: false
        type: string
        default: ""

env:
  GCP_PROJECT_ID: lattice-innovation-v2
  GCP_REGION: us-central1
  WIF_PROVIDER: projects/497764988925/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-actions-sa@lattice-innovation-v2.iam.gserviceaccount.com

jobs:
  promote:
    name: Promote ${{ inputs.service_name }} (${{ inputs.from_prefix }} → ${{ inputs.to_prefix }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.to_environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Get image from source service
        id: source
        run: |
          SOURCE_SERVICE="${{ inputs.from_prefix }}-${{ inputs.service_name }}"

          IMAGE=$(gcloud run services describe "$SOURCE_SERVICE" \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format="value(spec.template.spec.containers[0].image)" 2>&1)

          if [ -z "$IMAGE" ] || echo "$IMAGE" | grep -q "ERROR"; then
            echo "ERROR: Could not find image for ${SOURCE_SERVICE}"
            echo "Output: $IMAGE"
            exit 1
          fi

          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Promoting image: $IMAGE"
          echo "From: ${SOURCE_SERVICE} → To: ${{ inputs.to_prefix }}-${{ inputs.service_name }}"

      - name: Deploy to target service
        run: |
          TARGET_SERVICE="${{ inputs.to_prefix }}-${{ inputs.service_name }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DEPLOY_TS="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          DEPLOY_ARGS=(
            "$TARGET_SERVICE"
            "--image=${{ steps.source.outputs.image }}"
            "--region=${{ env.GCP_REGION }}"
            "--project=${{ env.GCP_PROJECT_ID }}"
            "--platform=managed"
            "--allow-unauthenticated"
            "--port=${{ inputs.port }}"
            "--memory=${{ inputs.memory }}"
            "--cpu=${{ inputs.cpu }}"
            "--max-instances=${{ inputs.max_instances }}"
          )

          # Deploy metadata env vars
          DEPLOY_VARS="DEPLOY_SHA=${{ github.sha }},DEPLOY_TAG=${{ inputs.deploy_tag || '' }},DEPLOY_TIMESTAMP=${DEPLOY_TS},ENVIRONMENT=${{ inputs.to_environment }}"
          if [ -n "${{ inputs.env_vars }}" ]; then
            DEPLOY_VARS="${DEPLOY_VARS},${{ inputs.env_vars }}"
          fi
          DEPLOY_ARGS+=("--set-env-vars=${DEPLOY_VARS}")

          if [ -n "${{ inputs.secrets }}" ]; then
            DEPLOY_ARGS+=("--set-secrets=${{ inputs.secrets }}")
          fi

          # Deploy metadata labels
          DEPLOY_ARGS+=("--update-labels=env=${{ inputs.to_environment }},git-sha=${SHORT_SHA},deploy-tag=${{ inputs.deploy_tag || 'none' }}")

          gcloud run deploy "${DEPLOY_ARGS[@]}"

      - name: Wait for Ready
        run: |
          SERVICE="${{ inputs.to_prefix }}-${{ inputs.service_name }}"
          TIMEOUT=120
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(gcloud run services describe "$SERVICE" \
              --region=${{ env.GCP_REGION }} \
              --project=${{ env.GCP_PROJECT_ID }} \
              --format="value(status.conditions[0].status)" 2>/dev/null || echo "UNKNOWN")

            if [ "$STATUS" = "True" ]; then
              URL=$(gcloud run services describe "$SERVICE" \
                --region=${{ env.GCP_REGION }} \
                --project=${{ env.GCP_PROJECT_ID }} \
                --format="value(status.url)")
              echo "Ready: $URL"
              exit 0
            fi

            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          echo "ERROR: ${SERVICE} did not become Ready within ${TIMEOUT}s"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## Promote: ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| From | ${{ inputs.from_prefix }}-${{ inputs.service_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| To | ${{ inputs.to_prefix }}-${{ inputs.service_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.to_environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Tag | ${{ inputs.deploy_tag || 'none' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.source.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
