# Reusable workflow: build a container image and deploy to Cloud Run.
#
# Supports multiple environments: dev, preview-a, preview-b — all in the same
# GCP project (lattice-innovation-v2), fully isolated from latticeorg projects.
#
# Flow:
#   push to main  → deploy-dev.yml   → build image + deploy to linno-v2-dev-{service}
#   tag pa-*      → promote-all.yml  → promote dev images to linno-v2-pa-{service}
#   tag pb-*      → promote-all.yml  → promote dev images to linno-v2-pb-{service}
#
# "Build once, deploy many" — preview environments reuse the same image built for dev.

name: Deploy to Cloud Run

on:
  workflow_call:
    inputs:
      service_name:
        description: "Cloud Run service name (e.g. integrator-service)"
        required: true
        type: string
      environment:
        description: "Target environment: dev, preview-a, or preview-b"
        required: false
        type: string
        default: "dev"
      deploy_tag:
        description: "Deploy tag (e.g. pa-2026-03-13, pb-hotfix-1). Empty for dev builds."
        required: false
        type: string
        default: ""
      service_prefix:
        description: "Prefix for Cloud Run service name (overrides environment). E.g. 'linno-v2' → linno-v2-{service}"
        required: false
        type: string
        default: ""
      dockerfile_path:
        description: "Path to the Dockerfile (for build mode)"
        required: false
        type: string
        default: "./src/main/docker/Dockerfile.jvm"
      build_context:
        description: "Docker build context directory (for build mode)"
        required: false
        type: string
        default: "."
      image_tag:
        description: "Existing image tag to deploy (skip build). Used for stg/prod promotion."
        required: false
        type: string
        default: ""
      port:
        description: "Container port"
        required: false
        type: number
        default: 8080
      memory:
        description: "Memory allocation (e.g. 512Mi, 1Gi)"
        required: false
        type: string
        default: "512Mi"
      cpu:
        description: "CPU allocation"
        required: false
        type: string
        default: "1"
      max_instances:
        description: "Maximum Cloud Run instances"
        required: false
        type: number
        default: 5
      env_vars:
        description: "Environment variables as KEY=value,KEY2=value2"
        required: false
        type: string
        default: ""
      secrets:
        description: "Secrets as ENV_NAME=secret-name:version"
        required: false
        type: string
        default: ""
      cloudsql_instance:
        description: "Cloud SQL instance connection name (project:region:instance)"
        required: false
        type: string
        default: ""

# GCP configuration — single project, fully isolated from latticeorg.
# latticeorg uses: latticepay-dev, latticepay-prod (different projects, different orgs)
# V2 uses: lattice-innovation-v2 only — no cross-project access possible.
env:
  GCP_PROJECT_ID: lattice-innovation-v2
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/lattice-innovation-v2/v2-images
  WIF_PROVIDER: projects/497764988925/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-actions-sa@lattice-innovation-v2.iam.gserviceaccount.com

jobs:
  deploy:
    name: Deploy ${{ inputs.service_prefix || inputs.environment }}-${{ inputs.service_name }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # Build step — only runs when no pre-built image_tag is provided (i.e., dev deploys).
      # Staging and prod skip this step and reuse the existing image.
      - name: Build and push image
        id: build
        if: inputs.image_tag == ''
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ env.ARTIFACT_REGISTRY }}/${{ inputs.service_name }}:${{ github.sha }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tag
        id: image
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
            echo "Using existing image: ${{ inputs.image_tag }}"
          else
            echo "tag=${{ env.ARTIFACT_REGISTRY }}/${{ inputs.service_name }}:${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "Using freshly built image: ${{ github.sha }}"
          fi

      # Deploy (create or update) the Cloud Run service with the new image.
      # Uses 'gcloud run deploy' which creates the service if it doesn't exist,
      # or updates it if it does. Pulumi can later adopt and manage the service.
      - name: Deploy Cloud Run service
        run: |
          PREFIX="${{ inputs.service_prefix || inputs.environment }}"
          SERVICE="${PREFIX}-${{ inputs.service_name }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DEPLOY_TS="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          DEPLOY_ARGS=(
            "$SERVICE"
            "--image=${{ steps.image.outputs.tag }}"
            "--region=${{ env.GCP_REGION }}"
            "--project=${{ env.GCP_PROJECT_ID }}"
            "--port=${{ inputs.port || '8080' }}"
            "--memory=${{ inputs.memory || '512Mi' }}"
            "--cpu=${{ inputs.cpu || '1' }}"
            "--max-instances=${{ inputs.max_instances || '5' }}"
            "--min-instances=0"
            "--allow-unauthenticated"
            "--no-use-http2"
          )

          # Deploy metadata env vars — always set
          DEPLOY_VARS="DEPLOY_SHA=${{ github.sha }},DEPLOY_TAG=${{ inputs.deploy_tag || 'none' }},DEPLOY_TIMESTAMP=${DEPLOY_TS},ENVIRONMENT=${{ inputs.environment }}"
          if [ -n "${{ inputs.env_vars }}" ]; then
            DEPLOY_VARS="${DEPLOY_VARS},${{ inputs.env_vars }}"
          fi
          DEPLOY_ARGS+=("--update-env-vars=${DEPLOY_VARS}")

          if [ -n "${{ inputs.secrets }}" ]; then
            DEPLOY_ARGS+=("--update-secrets=${{ inputs.secrets }}")
          fi

          if [ -n "${{ inputs.cloudsql_instance }}" ]; then
            DEPLOY_ARGS+=("--add-cloudsql-instances=${{ inputs.cloudsql_instance }}")
          fi

          # Deploy metadata labels
          DEPLOY_ARGS+=("--update-labels=env=${{ inputs.environment }},git-sha=${SHORT_SHA},deploy-tag=${{ inputs.deploy_tag || 'none' }}")

          gcloud run deploy "${DEPLOY_ARGS[@]}"

      - name: Wait for Ready
        run: |
          PREFIX="${{ inputs.service_prefix || inputs.environment }}"
          SERVICE="${PREFIX}-${{ inputs.service_name }}"
          TIMEOUT=120
          ELAPSED=0

          echo "Waiting for ${SERVICE} to become Ready..."

          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(gcloud run services describe "$SERVICE" \
              --region=${{ env.GCP_REGION }} \
              --project=${{ env.GCP_PROJECT_ID }} \
              --format="value(status.conditions[0].status)" 2>/dev/null || echo "UNKNOWN")

            if [ "$STATUS" = "True" ]; then
              URL=$(gcloud run services describe "$SERVICE" \
                --region=${{ env.GCP_REGION }} \
                --project=${{ env.GCP_PROJECT_ID }} \
                --format="value(status.url)")
              echo "Ready: $URL"
              exit 0
            fi

            sleep 10
            ELAPSED=$((ELAPSED + 10))
            echo "  status=$STATUS (${ELAPSED}s / ${TIMEOUT}s)"
          done

          echo "ERROR: ${SERVICE} did not become Ready within ${TIMEOUT}s"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## Deploy: ${{ inputs.service_prefix || inputs.environment }}-${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.image.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Memory | ${{ inputs.memory }} |" >> $GITHUB_STEP_SUMMARY
